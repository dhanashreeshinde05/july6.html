<!DOCTYPE html>

<html>
    <head>
        
        <title> HTML Multimedia page</title>
        <meta name="description" content=" video,audio,image, and iframe tags">
       
    </head>
    <body>
       <h1 style="color:rgb(222, 119, 218); text-align:center;">
        Welcome to my HTML Multimedia page
       </h1>
       <marquee behavior="alternate" direction="right" ></marque>
       
       <img src="developer.jpg" alt="developer Image" width="500" height="333">
    </marquee>
    <hr>
    <h1 style="color:rgb(222, 119, 218); text-align:center;">
        Video
       </h1>
       <video width="320" height="240" controls>
        <source src="coder.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <hr>
      <h1 style="color:rgb(222, 119, 218); text-align:center;">
        Audio
       </h1>
       <audio controls>
        <source src="onandon.mpeg" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
      <hr>
      <h1 style="color:rgb(222, 119, 218); text-align:center;">
        Iframe
       </h1>
       <iframe src="https://www.spsgoldrefinery.com" width="1200" height="400"></iframe>
       <hr>
    </body>
    </body>
</html>
